<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Seamless girih-style tile: octagram + octagon + jaali straps (strokes only) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="rgba(255,255,255,0.16)" stroke-width="1.15">
      <!-- 8-point star (octagram) -->
      <polygon points="50,8 58,28 78,22 64,38 92,50 64,62 78,78 58,72 50,92 42,72 22,78 36,62 8,50 36,38 22,22 42,28"/>
      <!-- Inner octagon -->
      <polygon points="50,22 64,36 78,50 64,64 50,78 36,64 22,50 36,36"/>
      <!-- Lattice straps to tile edges (inner octagon) -->
      <line x1="50" y1="0" x2="50" y2="22"/>
      <line x1="50" y1="78" x2="50" y2="100"/>
      <line x1="0" y1="50" x2="22" y2="50"/>
      <line x1="78" y1="50" x2="100" y2="50"/>
      <!-- Corner connectors (tile seams) -->
      <line x1="0" y1="0" x2="22" y2="22"/>
      <line x1="100" y1="0" x2="78" y2="22"/>
      <line x1="0" y1="100" x2="22" y2="78"/>
      <line x1="100" y1="100" x2="78" y2="78"/>
      <!-- Interlocking kite diagonals (weave) -->
      <line x1="22" y1="22" x2="36" y2="36"/>
      <line x1="78" y1="22" x2="64" y2="36"/>
      <line x1="22" y1="78" x2="36" y2="64"/>
      <line x1="78" y1="78" x2="64" y2="64"/>
    </g>
    <!-- Rosette - lighter 8-petal centre -->
    <g stroke="rgba(255,255,255,0.1)" stroke-width="0.85">
      <circle cx="50" cy="50" r="8"/>
      <circle cx="50" cy="50" r="3" stroke="rgba(255,255,255,0.08)" stroke-width="0.65"/>
      <line x1="50" y1="42" x2="50" y2="37"/>
      <line x1="58.83" y1="44.14" x2="62.24" y2="40.76"/>
      <line x1="58.83" y1="55.86" x2="62.24" y2="59.24"/>
      <line x1="50" y1="58" x2="50" y2="63"/>
      <line x1="41.17" y1="55.86" x2="37.76" y2="59.24"/>
      <line x1="41.17" y1="44.14" x2="37.76" y2="40.76"/>
      <line x1="58" y1="50" x2="63" y2="50"/>
      <line x1="42" y1="50" x2="37" y2="50"/>
    </g>
  </g>
</svg>
